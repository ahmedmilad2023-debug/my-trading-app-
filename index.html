<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0d0d0d" />
    <meta name="description" content="تطبيق إشارات تداول العملات الرقمية باستخدام Order Blocks و ADX" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <title>Crypto Signals PWA</title>
    <link rel="stylesheet" href="style.css" />
    <!-- مكتبة صوتية بسيطة للتنبيهات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- رأس التطبيق -->
        <header>
            <div class="logo">
                <span class="icon">📈</span>
                <h1>إشارات كريبتو</h1>
            </div>
            <div class="header-actions">
                <button id="notification-toggle" class="icon-btn" aria-label="تفعيل/إيقاف التنبيهات">🔔</button>
                <button id="install-btn" class="icon-btn" aria-label="تثبيت التطبيق" style="display:none;">📲</button>
            </div>
        </header>

        <!-- لوحة التحكم -->
        <section class="dashboard">
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-label">الإشارات اليوم</span>
                    <span class="stat-value" id="daily-signals">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">الرابحة</span>
                    <span class="stat-value" id="win-rate">0%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">الخاسرة</span>
                    <span class="stat-value" id="loss-rate">0%</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">آخر تحديث</span>
                    <span class="stat-value" id="last-update">--:--</span>
                </div>
            </div>
        </section>

        <!-- حالة السوق -->
        <section class="market-status">
            <h2>حالة السوق</h2>
            <div id="market-overview" class="market-grid">
                <!-- سيتم ملؤها ديناميكياً -->
            </div>
        </section>

        <!-- لوحة الإشارات -->
        <section class="signals-panel">
            <h2>الإشارات الحية</h2>
            <div id="signals-list" class="signals-list">
                <!-- سيتم عرض الإشارات هنا -->
                <div class="placeholder">بانتظار الإشارات...</div>
            </div>
        </section>

        <!-- سجل الإشارات -->
        <section class="history-panel">
            <h2>سجل الإشارات</h2>
            <div id="history-list" class="history-list">
                <!-- سجل الإشارات السابقة -->
            </div>
        </section>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
